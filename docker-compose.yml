version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mecanicao_db
    network_mode: "host"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_DATABASE: mecanicao_pcm
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
